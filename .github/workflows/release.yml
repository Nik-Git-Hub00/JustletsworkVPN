name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump from latest tag"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
          - manual
      version:
        description: "Manual version, for example 1.0.0. Required when bump=manual."
        required: false
        type: string
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          elif [[ "${{ github.event.inputs.bump || 'patch' }}" == "manual" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            latest="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
            if [[ -z "$latest" ]]; then
              version="1.0.0"
            else
              base="${latest#v}"
              IFS=. read -r major minor patch <<< "$base"
              case "${{ github.event.inputs.bump || 'patch' }}" in
                major) major=$((major + 1)); minor=0; patch=0 ;;
                minor) minor=$((minor + 1)); patch=0 ;;
                patch) patch=$((patch + 1)) ;;
                *) echo "Unsupported bump" >&2; exit 64 ;;
              esac
              version="$major.$minor.$patch"
            fi
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must look like 1.0.0" >&2
            exit 64
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  macos:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            runs_on: macos-14
            architecture: arm64
            python_architecture: arm64
          - name: macos-x64
            runs_on: macos-14
            architecture: x64
            python_architecture: x64
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          architecture: ${{ matrix.python_architecture }}
      - name: Build ${{ matrix.name }}
        env:
          APP_VERSION: ${{ needs.version.outputs.version }}
          APP_UPDATE_REPO: ${{ github.repository }}
        run: ./scripts/build_macos.sh ${{ matrix.architecture }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            release/*.zip
            release/*.dmg

  windows:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            runs_on: windows-latest
            architecture: amd64
            python_architecture: x64
          - name: windows-arm64
            runs_on: windows-11-arm
            architecture: arm64
            python_architecture: arm64
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          architecture: ${{ matrix.python_architecture }}
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y
      - name: Build ${{ matrix.name }}
        shell: pwsh
        env:
          APP_VERSION: ${{ needs.version.outputs.version }}
          APP_UPDATE_REPO: ${{ github.repository }}
        run: ./scripts/build_windows.ps1 -Architecture ${{ matrix.architecture }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            release/*.zip
            release/*.exe

  linux:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runs_on: ubuntu-24.04
          - name: linux-arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install package tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm dpkg-dev
      - name: Build ${{ matrix.name }}
        env:
          APP_VERSION: ${{ needs.version.outputs.version }}
        run: |
          ./scripts/build_linux.sh
          ./scripts/package_linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            release/*.tar.gz
            release/*.deb
            release/*.rpm

  release:
    needs:
      - version
      - macos
      - windows
      - linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          commit_hash="$(git log -1 --format='%h')"
          commit_subject="$(git log -1 --format='%s')"
          commit_body="$(git log -1 --format='%b')"

          {
            echo "Automatic WorkVPN $VERSION build"
            echo
            echo "### Latest commit"
            echo "- \`$commit_hash\` $commit_subject"
            if [[ -n "$commit_body" ]]; then
              echo
              echo "$commit_body"
            fi
          } > release_notes.md

          gh release create "$TAG" artifacts/* \
            --repo "$GH_REPO" \
            --title "WorkVPN $VERSION" \
            --notes-file release_notes.md \
            --latest
